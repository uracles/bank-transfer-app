spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true

app:
  transfer:
    fee-cap: 100.0
    fee-rate: 0.005
    commission-rate: 0.20
  scheduler:
    commission-cron: "0 */5 * * * *"
    summary-cron: "0 */5 * * * *"